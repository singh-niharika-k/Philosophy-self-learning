<script>
// ===== COURSE DATA =====
const COURSE = [
  {
    week: 1,
    title: "Foundations & The Self <em>You're Authoring</em>",
    blurb: "What philosophy actually is, how you know what you know, the freedom question, and meaning as something you make rather than find.",
    cardStyle: "default",
    illo: "seated",
    chapters: [
      {
        id: "1.1",
        title: "Why philosophy is asking, not answering",
        sub: "The five branches — and why ethics and metaphysics carry the most weight for daily life.",
        flagged: "You highlighted: <em>\"the disciplined practice of asking hard questions and following them wherever they lead.\"</em> This chapter sits with the orientation behind that line — philosophy as a posture, not a body of facts.",
        body: `
          <p>Philosophy comes from <em class="term">philos</em> (love) + <em class="term">sophia</em> (wisdom). A philosopher is not someone who has solved life. A philosopher is someone who has learned to sit with the unsolvable without panicking — which turns out to be a transferable skill.</p>
          <p>The discipline has five branches: <strong>metaphysics</strong> (what is real), <strong>epistemology</strong> (what can be known), <strong>ethics</strong> (how to live), <strong>logic</strong> (how to reason well), and <strong>aesthetics</strong> (what beauty is and what taste reveals). You already ask each of these informally. The discipline just refuses to let you drop the question.</p>
          <h3>What this implies for how you read the rest</h3>
          <p>Treat every framework you meet as a tool, not a verdict. The point is not to choose a "side" — it is to learn how to think well enough that, when life requires it, you have language and structure for the choices you are already making.</p>
        `,
        quiz: {
          q: "Which two branches does the original document say carry the most weight for building a personal worldview?",
          opts: ["Logic and aesthetics", "Ethics and metaphysics", "Epistemology and logic", "Metaphysics and aesthetics"],
          correct: 1,
          why: "Ethics (how to live, what we owe each other) and metaphysics (what's real, what the self is) do most of the heavy lifting for an examined life."
        },
        journal: "Which of the five branches do you find yourself thinking about most often, without realizing it was philosophy? Where does that show up in your week?"
      },
      {
        id: "1.2",
        title: "Epistemology — how do you know what you know?",
        sub: "Your first flagged comment was 'Look more into this.' Here it is.",
        flagged: "You marked epistemology with <strong>\"Look more into this.\"</strong> The branch matters because it quietly governs how confident you let yourself be about anything.",
        body: `
          <p>Epistemology asks: what is the difference between believing something and knowing it? The classical answer is that <em class="term">knowledge</em> is justified true belief. You believe it, it happens to be true, and you have a reason for believing it. Strip away any of the three legs and you have something less.</p>
          <h3>Three distinctions worth carrying</h3>
          <p><strong>Belief vs. knowledge.</strong> A belief becomes knowledge only when it is both true and justified — luck doesn't count. If you happen to guess the right answer, you didn't "know" it.</p>
          <p><strong>Justification vs. truth.</strong> You can be justified in believing something that turns out to be false. Everyone before Galileo was justified in thinking the sun orbited the earth — the evidence available pointed that way. This is humbling: being careful does not guarantee being right.</p>
          <p><strong>Foundationalism vs. coherentism.</strong> Do beliefs rest on a base of self-evident truths (foundationalism), or do they hang together as a self-supporting web (coherentism)? Most people switch between these depending on what they are arguing about.</p>
          <h3>The skill underneath all of this</h3>
          <p>Calibration. Holding beliefs with confidence proportional to evidence, and being willing to say "I don't know" without it feeling like a failure. Most intellectual mistakes are not lies — they're overconfidence.</p>
        `,
        quiz: {
          q: "By the classical definition, when does a belief become knowledge?",
          opts: ["When most people agree with it", "When it's both true and you have justification for it", "When it can be proven mathematically", "When it feels certain"],
          correct: 1,
          why: "Knowledge = justified true belief. You can have a true belief by luck, or a justified false belief — neither counts as knowledge."
        },
        journal: "What's something you've been very confident about that turned out to be wrong? What kind of evidence would have helped you calibrate sooner?"
      },
      {
        id: "1.3",
        title: "Free will & responsibility",
        sub: "The question that quietly governs how you blame, forgive, and forgive yourself.",
        flagged: "You highlighted: <em>\"governs how you assign blame, how you forgive, and how much responsibility you feel for your own life.\"</em> Worth examining the position you didn't know you had.",
        body: `
          <p>If your choices are produced by genes, upbringing, neurochemistry, and circumstance — none of which you chose — what does it mean to hold yourself responsible? Three camps, in increasing usefulness for daily life:</p>
          <p><strong>Hard determinists</strong> say there is no free will. Every choice is the inevitable output of prior causes. This is intellectually defensible and emotionally unlivable.</p>
          <p><strong>Libertarians</strong> (the metaphysical kind, not the political kind) say genuine, uncaused free will exists and is what makes moral responsibility possible. This is harder to defend with neuroscience.</p>
          <p><strong>Compatibilists</strong> — the largest contemporary camp — argue that free will and determinism do not actually conflict. You are <em>free</em> when your actions flow from <em>your own</em> desires, values, and reasoning, even if those were themselves shaped by causes outside you. The "self" doing the choosing is built — but it is still you. This is the position that lets you take your life seriously without requiring belief in a magical uncaused homunculus.</p>
          <h3>Why this is practical, not academic</h3>
          <p>The position you hold (often without examining it) shapes whether you forgive yourself for past decisions made by an earlier, less-informed version of you — and whether you extend the same to other people. Most people would do well to be slightly more compatibilist about themselves than they currently are.</p>
        `,
        quiz: {
          q: "The compatibilist position says:",
          opts: ["Free will doesn't exist — get over it.", "Free will exists in a magical, uncaused way.", "Free will and determinism are compatible — you're 'free' when actions flow from your own values, even if those were shaped by causes.", "Whether you have free will depends on the day."],
          correct: 2,
          why: "Compatibilism redefines freedom as acting in line with your own desires and values, without needing those desires to be uncaused. It's the most livable of the three positions."
        },
        journal: "Recall a decision you've harshly judged yourself for. Knowing what shaped the version of you who made it, how would a compatibilist hold you to account — and where would they grant grace?"
      },
      {
        id: "1.4",
        title: "Meaning is made — living in the present and creating",
        sub: "Your strongest comment in the doc was here.",
        flagged: "Your comment: <strong>\"I think I think this. I don't want to always be searching. I want to live in the present and create my life content.\"</strong> This chapter takes that seriously.",
        body: `
          <p>The two camps on meaning produce radically different people. <strong>Discovered meaning</strong> says there is something out there to find — a purpose, a path, a calling — and your job is attunement. <strong>Made meaning</strong> says there is no external rubric; you are always the author.</p>

          <p><strong>3. Presentness is not avoidance — it is the work.</strong> The existentialists would say: living in the present and adding meaning to your life through what you are actually doing is not a distraction from "real" purpose. It is the only place real purpose ever happens. You compose the meaning by composing the day.</p>

          <p>The Buddhist concept of <em class="term">anatta</em> — non-self — does not deny that there is something there. Clearly there is experience, preference, behavior. It denies that any of those things is a fixed essence. The "self" is more like a verb than a noun: a continuous <em>selfing</em>, made of momentary thoughts, sensations, and intentions that arise and pass.</p>
          <h3>Two practical payoffs</h3>
          <p><strong>You are allowed to change.</strong> Radically, repeatedly. Without owing anyone consistency with a younger version of you that no longer exists. The pressure to "stay true to who you've always been" assumes a who that doesn't exist in the way the sentence implies.</p>

          <h3>The Western echo: Derek Parfit</h3>
          <p>Parfit argued that personal identity over time is a matter of <em>psychological continuity</em>, not metaphysical sameness. Your relationship to "future you" is more like your relationship to a close relative than to an identical twin. This sounds abstract but has surprising consequences: it makes long-term decisions feel less coercive (you are not being held hostage by a future stranger) and it makes self-forgiveness feel less like denial.</p>

          <p>Utilitarianism (Bentham, Mill) says the right choice is the one that produces the greatest good for the greatest number. It is clean, measurable, democratic. It is also the moral grammar underneath most modern progressive policy.</p>
          <h3>Why utilitarianism leans social-democratic</h3>
          <p>Two empirical claims do the heavy lifting. <strong>Diminishing marginal utility:</strong> an extra dollar means much more to a poor person than a rich one — so redistributing some wealth produces more aggregate welfare than concentrating it. <strong>Market under-production:</strong> goods like health, education, and security are systematically under-supplied by markets alone, because their benefits spill over to people who didn't pay. Universal healthcare, progressive taxation, public goods, harm-reduction policy — these all sit on a utilitarian foundation.</p>

          <p>John Rawls is not strictly a utilitarian, but he sharpened the same intuition with a powerful thought experiment. Imagine you had to design a society without knowing which position you'd occupy in it — race, gender, wealth, talent, parents, all unknown. Most people, reasoning behind that veil, choose something much closer to social democracy than to pure libertarianism. They want robust floors because they might land on one.</p>

        body: `
          <p>Your instinct is half right. Kant cares about the <em class="term">maxim</em> of your action — the principle you are acting on — because that's the part you actually control. But Kant's "intent" is not what you happened to feel. It is whether your reasoning, made universal, holds up.</p>
          <h3>The categorical imperative, in two versions</h3>
          <p><strong>Universalizability.</strong> Could you will that <em>everyone</em> act on the principle you're about to act on? Could you will that everyone lie when it's convenient? Then lying fails the test, regardless of consequences.</p>

          <h3>So how is Kant different from utilitarianism?</h3>
          <p>Utilitarianism judges only outcomes. The same action could be right on Monday and wrong on Tuesday, depending on what it produced. Kant judges the principle, regardless of outcome. The two often <em>converge</em> in practice — lying is usually bad in both systems, because it produces bad outcomes and also fails universalization. They diverge at the edges.</p>

          <p>Virtue ethics (Aristotle, MacIntyre) shifts the question from "what should I do?" to "what kind of person should I be?" The moral life is the cultivation of character — courage, honesty, generosity, practical wisdom — and the pursuit of <em class="term">eudaimonia</em>: flourishing.</p>

          <p>Aristotle distinguishes three types of friendship.</p>

          <p>Martin Buber described two orientations toward the world. <strong>I-It</strong>: we relate to others as objects — useful, categorizable, instrumental. <strong>I-Thou</strong>: we encounter another as a full subject, irreducible and present. Most interactions are I-It and have to be — you cannot have an I-Thou moment with every stranger without collapsing. But I-Thou moments are what make relationships <em>nourishing</em>, and most modern relationships starve from their scarcity rather than from lack of time.</p>

        body: `
          <p>Care ethics (Gilligan, Noddings, Held) emerged as a feminist challenge to abstract moral theories. It argues that ethical life is not primarily about rights, rules, or calculation — it's about responsiveness to particular people in particular relationships. We are not isolated rational agents; we are embedded in webs of dependency and mutual need from birth.</p>
          <h3>Three verbs that do most of the work</h3>
          <p><strong>Showing up.</strong> Easy to underestimate. It means being physically or attentionally present when it is inconvenient, repeatedly, without being asked. Most of the people who shaped you did this for you in ways you may not have catalogued. The friend who came to the hospital. The parent who waited up. The colleague who stayed late on a hard day.</p>
          <p><strong>Listening.</strong> A specific skill. Not waiting for your turn. Not formulating your response. Not silently diagnosing. Receiving the other person's experience on its own terms long enough that they feel met. Nel Noddings calls this <em class="term">engrossment</em> — temporarily letting the other person's reality matter as much to you as your own.</p>
          <p><strong>Noticing.</strong> The most rare and most consequential. Catching the small signal — the slightly off voice, the unanswered text, the way someone goes quiet — and choosing to respond to it rather than letting it pass. Care ethicists argue that whole lives are saved or lost in this third register, and that most failures of care look not like cruelty but like inattention.</p>

          <p>Care ethics says the abstract moral theories miss the texture of where ethics actually lives — in particular relationships with particular people. A grand commitment to "humanity" that fails to show up for the specific human in front of you is not a moral achievement; it's an evasion.</p>

        body: `
          <p>Simone Weil — philosopher, mystic, and one of the strangest moral imaginations of the twentieth century — wrote that <em>the rarest and purest form of generosity is attention</em>. Not advice. Not help. Not resources. The willingness to truly attend to another person's reality.</p>
          <h3>Why she thought attention was so hard</h3>
          <p>Because of how easily it is corrupted. Most of what we call "listening" is actually pattern-matching: we hear the first few words and pre-load our response, our advice, our judgment, our analogy from our own life. The other person's experience never quite arrives — it gets metabolized into our framework before it lands.</p>

        sub: "Your strongest reaction in the doc was here.",
        flagged: "Your comment: <strong>\"woah.\"</strong> The line: <em>\"belonging is not a luxury or a preference but a condition of becoming a person at all.\"</em> Here's why it lands so hard.",
        body: `
          <p>Communitarianism (Charles Taylor, Michael Sandel, Alasdair MacIntyre) pushes back against the dominant modern story of the self — what we can call the <em class="term">supermarket model of identity</em>.</p>
          <h3>The supermarket model — and why it's backwards</h3>
          <p>The supermarket model says: the self is a sovereign chooser who arrives complete and then selects values, relationships, and communities the way one selects groceries. You pick your career, your beliefs, your friends, your traditions, from an open menu.</p>
          <p>Communitarians say this gets the order backwards. The language you think in. The categories that feel intuitive. The moral reactions you experience as instinct. The things you find meaningful. These were not chosen. They were <em>transmitted</em> — through families, neighborhoods, traditions, shared practices, accidents of geography. You did not pick the lens. The lens is what allows you to pick anything else.</p>
          <h3>Why the claim is "woah"</h3>
          <p>If belonging is <em>constitutive</em> — not just nice, but a condition of becoming a self at all — then several modern assumptions need rethinking.</p>
          <p>A maximally free life, lived without genuine membership in any community, is not the freest life. It's the <em>thinnest</em> one. The self that emerges from no community has nothing to be free with.</p>
          <p>Investing in community — even imperfect, demanding, slow community — is not a hobby or a preference. It's part of the basic infrastructure of being a person. You are not adding something optional. You are building the ground you stand on.</p>
          <p>The erosion of community is not just a sad social trend. It's a philosophical emergency, because it removes the precondition of personhood for the people living through it.</p>
        `,
        quiz: {
          q: "The communitarian claim that belonging is \"constitutive\" of personhood means:",
          opts: ["Communities are nice to have if you can find one", "Community is a moral obligation imposed on you", "You do not pre-exist your communities — the values, language, and categories that make you a self were transmitted by them", "Strong communities are better than weak ones"],
          correct: 2,
          why: "Constitutive means: you can't bootstrap a self out of nothing. The lens that lets you make any choice was given by the communities that formed you."
        },
        journal: "Name two communities — broadly defined — that constituted you. Which of their gifts do you still carry? Which gift have you been undervaluing, and what would investing back in it look like?"
      },
      {
        id: "4.2",
        title: "Loneliness as a civic crisis",
        sub: "Not a personal failure. A signal.",
        flagged: "You highlighted the structural response: <em>\"invest in community, practice hospitality, show up imperfectly and repeatedly.\"</em>",
        body: `
          <p>Contemporary philosophers have begun to treat loneliness not as a personal failure but as a philosophical and civic crisis. To be chronically unseen, ungrouped, un-belonging is to be denied something <em>constitutive</em> of human personhood — which is why it hurts in a way that ordinary disappointment does not.</p>
          <h3>The reframe</h3>
          <p>If loneliness is a signal — like hunger — then the response is not self-improvement (more confidence, more charisma, more therapy alone). It is structural. The same way you cannot "personality-trait" your way out of a food desert, you cannot personality-trait your way out of a community desert.</p>
          <h3>What the structural response looks like</h3>
          <p><strong>Invest in community.</strong> Show up to the imperfect group, the awkward dinner, the regular Tuesday class. Communities are slow accretions, not events. Be present to one for long enough that you become part of its memory.</p>
          <p><strong>Practice hospitality.</strong> Open your space. Cook for people. Host the small thing. The act of hosting reverses the consumer-of-community posture and makes you a producer of belonging — for yourself and others.</p>
          <p><strong>Show up imperfectly and repeatedly.</strong> The fantasy that you'll show up "when you have it together" is the loneliness trap. Communities form among people who show up <em>now</em>, awkward and incomplete, and keep showing up.</p>
          <blockquote>The cure for loneliness is not better self-presentation. It is a few unglamorous habits, held over years.</blockquote>
        `,
        quiz: {
          q: "Why do contemporary philosophers say loneliness should be treated structurally, not just as a personal issue?",
          opts: ["Because lonely people are weak", "Because belonging is constitutive of personhood — the absence of it isn't a feeling problem, it's a denial of a condition of being a person", "Because therapy doesn't work", "Because community is always virtuous"],
          correct: 1,
          why: "Once you see belonging as constitutive — not optional — the response can't be purely individual. It has to be about rebuilding the conditions in which selves form."
        },
        journal: "Which one unglamorous habit could you commit to this season — a regular group, a hosted ritual, a recurring presence — that would tend to community rather than waiting for it to find you?"
      },
      {
        id: "4.3",
        title: "Building your worldview",
        sub: "Coherent, not airtight.",
        flagged: "You highlighted: <em>\"a worldview is not a list of positions. It is a coherent orientation — a way of standing in the world.\"</em>",
        body: `
          <p>A worldview is not a list of declared positions on free will and meaning and ethics, neatly filed. It is a coherent orientation — a way of standing in the world that shapes how you perceive, interpret, and respond. Building one consciously is one of the most important projects you can undertake, and it is never truly finished.</p>
          <h3>Four working principles</h3>
          <p><strong>Tolerate productive inconsistency.</strong> You don't need a single airtight system. Real lives are philosophically plural. You may find Stoic tools useful for managing anxiety, hold existentialist views about meaning, and be moved by care ethics in relationships. What matters is that you are aware of the tensions and can think through them when they arise.</p>
          <p><strong>Test your views against your life.</strong> Philosophy that stays in the head is incomplete. When something strikes you as true, ask: what would it mean to <em>act</em> on this? When you notice yourself behaving in a way that conflicts with a stated value, that is not hypocrisy — it is data. It tells you something about what you actually believe versus what you think you believe.</p>
          <p><strong>Practice epistemic humility.</strong> The history of philosophy is largely a history of confident people being eventually shown to be wrong, or at least incomplete. Hold your views firmly enough to act on them, loosely enough to revise them.</p>
          <p><strong>Return to the question of the good life often.</strong> The question of what flourishing looks like <em>for you</em> — not in general, but specifically, given who you are right now — deserves to be revisited every few years as you change.</p>
        `,
        quiz: {
          q: "Which is the best stance toward your own philosophical views, by the principles in this course?",
          opts: ["Choose one school and adhere to it strictly to remain consistent", "Avoid declaring views at all, to stay open", "Hold them firmly enough to act on them, loosely enough to revise them", "Adopt whichever framework is most popular"],
          correct: 2,
          why: "Epistemic humility plus action. Confidence proportional to evidence, with the willingness to update when the evidence shifts."
        },

      {

        title: "Where to go next",
        sub: "A reading list shaped by your highlights.",
        flagged: "Curated to extend the threads you marked — existentialism, friendship, I-Thou, attention, community.",
        body: `
          <h3>If existentialism / self-authorship pulled hardest</h3>
          <p><em>The Myth of Sisyphus</em> by Albert Camus. <em>Existentialism Is a Humanism</em> by Sartre — the shortest, clearest entry. <em>The Second Sex</em> (selections) by Simone de Beauvoir.</p>
          <h3>If you want Aristotle's friendship up close</h3>
          <p>Books VIII and IX of the <em>Nicomachean Ethics</em>. Skip the rest of the book first if it's intimidating; those two are the heart for friendship.</p>
          <h3>If Buber landed</h3>
          <p><em>I and Thou</em>. Short, dense, repays slow reading. The Walter Kaufmann translation is the standard.</p>
          <h3>If care ethics and Weil landed</h3>
          <p><em>Caring</em> by Nel Noddings — foundational. <em>Waiting for God</em> by Simone Weil — contains her essay on attention; transformative and short. <em>The Lonely City</em> by Olivia Laing — extraordinary on loneliness and connection.</p>
          <h3>If utilitarianism / political philosophy is the live thread</h3>
          <p><em>Justice: What's the Right Thing to Do?</em> by Michael Sandel (book and free Harvard course at justiceharvard.org). <em>A Theory of Justice</em> by John Rawls — or a good summary; the original is long.</p>
          <h3>For ongoing practice</h3>
          <p><em>Meditations</em> by Marcus Aurelius — the most practical philosophical text ever written. <em>Sophie's World</em> by Jostein Gaarder — a novel that doubles as a history of philosophy. The podcasts <em>Philosophy Bites</em> and <em>The Partially Examined Life</em>.</p>
          <blockquote>The philosopher's ultimate tool is not a system. It is a question held with enough patience that it begins to answer itself. Begin anywhere. Begin now.</blockquote>
        `,
        quiz: {
          q: "Which book would best extend your interest in attention, listening, and the moral life of small acts?",
          opts: ["A Theory of Justice by John Rawls", "The Myth of Sisyphus by Camus", "Waiting for God by Simone Weil", "Meditations by Marcus Aurelius"],
          correct: 2,
          why: "Weil's essay on attention is in this collection. It is short, demanding, and directly extends the thread you flagged."

// ===== STATE =====
const LS_KEY = "philosophy_course_v2";
function loadState() { try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e) { return {}; } }
function saveState(s) { localStorage.setItem(LS_KEY, JSON.stringify(s)); }
let state = loadState();
state.completed = state.completed || {};
state.journals = state.journals || {};
state.quizPicks = state.quizPicks || {};
state.view = state.view || "home";

// ===== HELPERS =====
function totalChapters() { return COURSE.reduce((n, w) => n + w.chapters.length, 0); }
function completedCount() { return Object.keys(state.completed).filter(k => state.completed[k]).length; }
function weekCompletedCount(w) { return w.chapters.filter(c => state.completed[c.id]).length; }
function findChapter(id) { for (const w of COURSE) for (const c of w.chapters) if (c.id === id) return { week: w, chapter: c }; return null; }
function nextChapter(id) { const all = COURSE.flatMap(w => w.chapters); const i = all.findIndex(c => c.id === id); return (i >= 0 && i < all.length - 1) ? all[i + 1] : null; }
function prevChapter(id) { const all = COURSE.flatMap(w => w.chapters); const i = all.findIndex(c => c.id === id); return (i > 0) ? all[i - 1] : null; }
function findWeekOf(chapterId) { for (const w of COURSE) if (w.chapters.find(c => c.id === chapterId)) return w; return null; }

// ===== HEADER PROGRESS =====
function renderHeaderProgress() {
  document.getElementById("progress-label").textContent = `${completedCount()} / ${totalChapters()}`;
  const wrap = document.getElementById("pdots");
  wrap.innerHTML = "";
  COURSE.forEach(w => {
    const dot = document.createElement("div");
    const done = weekCompletedCount(w);
    const pct = Math.round(100 * done / w.chapters.length);
    if (pct === 100) dot.className = "pdot done";
    else if (pct > 0) { dot.className = "pdot partial"; dot.style.setProperty("--p", pct + "%"); }
    else dot.className = "pdot";
    dot.title = `Week ${w.week}: ${done}/${w.chapters.length}`;
    dot.onclick = () => loadWeek(w.week);
    wrap.appendChild(dot);
  });
}

// ===== VIEWS =====
function goHome() {
  state.view = "home"; state.currentId = null; state.currentWeek = null;
  saveState(state); renderHome(); renderHeaderProgress();
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function loadWeek(num) {
  state.view = "week"; state.currentWeek = num; state.currentId = null;
  saveState(state); renderWeek(num); renderHeaderProgress();
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function loadChapter(id) {
  state.view = "chapter"; state.currentId = id; state.currentWeek = findWeekOf(id).week;
  saveState(state); renderChapter(id); renderHeaderProgress();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function renderHome() {
  let html = `
    <section class="hero view">
      <div class="eyebrow">A self-guided course in philosophy</div>
      <h1>How to think about <em>being</em> alive.</h1>
      <p class="lede">Eighteen chapters across four weeks, shaped around the passages you highlighted. Brief quizzes to make ideas stick. Journal prompts to test ideas against your life. Everything saves locally.</p>
      <div class="hero-side">${ILLOS.seated(180)}</div>
    </section>
    <section class="weeks-grid view">`;
  COURSE.forEach(w => {
    const done = weekCompletedCount(w);
    const total = w.chapters.length;
    const cardCls = "week-card " + (w.cardStyle === "alt" ? "alt" : w.cardStyle === "blue" ? "blue" : "");
    const weekWords = ["one", "two", "three", "four"];
    html += `
      <article class="${cardCls}" onclick="loadWeek(${w.week})">
        <div class="illo">${ILLOS[w.illo](84)}</div>
        <div class="wc-number">Week ${weekWords[w.week-1]}</div>
        <h3>${w.title}</h3>
        <p class="wc-blurb">${w.blurb}</p>
        <div class="wc-progress">${done} / ${total} chapters · ${done === total ? "Complete" : done === 0 ? "Begin" : "Continue"}</div>
      </article>`;
  });
  html += `</section>
    <section class="closing-strip view">
      <div class="eyebrow">A closing thought</div>
      <p>"The philosopher's ultimate tool is not a system. It is a question held with enough patience that it begins to answer itself."</p>
    </section>`;
  document.getElementById("main").innerHTML = html;
}

function renderWeek(num) {
  const w = COURSE.find(x => x.week === num);
  if (!w) { goHome(); return; }
  const done = weekCompletedCount(w);
  const weekWords = ["one", "two", "three", "four"];
  let html = `
    <a class="back-link" onclick="goHome()">← Course home</a>
    <section class="week-hero view">
      <div>
        <div class="eyebrow blue">Week ${weekWords[w.week-1]} · ${done}/${w.chapters.length}</div>
        <h2>${w.title}</h2>
        <p class="blurb">${w.blurb}</p>
      </div>
      <div class="illo-wrap">${ILLOS[w.illo](200)}</div>
    </section>
    <section class="chapters-list view">`;
  w.chapters.forEach(c => {
    const isDone = !!state.completed[c.id];
    html += `
      <article class="chapter-row ${isDone ? "done" : ""}" onclick="loadChapter('${c.id}')">
        <div class="cr-num">${c.id}</div>
        <div class="cr-body">
          <h4>${c.title}</h4>
          <p>${c.sub}</p>
        </div>
        <div class="cr-status"><div class="dot"></div></div>
      </article>`;
  });
  html += `</section>`;
  document.getElementById("main").innerHTML = html;
}

function renderChapter(id) {
  const { week, chapter } = findChapter(id);
  const journalKey = "j_" + id;
  const journalText = state.journals[journalKey] || "";
  const quizPick = state.quizPicks[id];
  const prev = prevChapter(id);
  const next = nextChapter(id);
  const isDone = !!state.completed[id];

  let optsHtml = chapter.quiz.opts.map((o, i) => {
    let cls = "opt";
    if (quizPick !== undefined) {
      if (i === chapter.quiz.correct) cls += " correct";
      else if (i === quizPick) cls += " incorrect";
    } else if (state.tempPick === i) cls += " selected";
    const disabled = quizPick !== undefined ? "data-disabled" : "";
    return `<div class="${cls}" data-i="${i}" ${disabled} onclick="pickOpt('${id}', ${i})">${o}</div>`;
  }).join("");

  let feedbackHtml = "";
  if (quizPick !== undefined) {
    const correct = quizPick === chapter.quiz.correct;
    feedbackHtml = `<div class="feedback show ${correct ? "ok" : "no"}"><strong>${correct ? "Correct. " : "Not quite. "}</strong>${chapter.quiz.why}</div>`;
  }

  let html = `
    <div class="crumbs">
      <a onclick="goHome()">Home</a><span class="sep">/</span>
      <a onclick="loadWeek(${week.week})">Week ${week.week}</a><span class="sep">/</span>
      <span>Chapter ${chapter.id}</span>
    </div>
    <section class="ch-hero view">
      <h1>${chapter.title}</h1>
      <p class="ch-sub">${chapter.sub}</p>
    </section>
    <div class="container-narrow view">
      <div class="flagged">${chapter.flagged}</div>
      <div class="content">${chapter.body}</div>
      <div class="card">
        <div class="card-head"><span class="card-eyebrow">Quick check</span><span class="card-line"></span></div>
        <div class="q">${chapter.quiz.q}</div>
        ${optsHtml}
        ${feedbackHtml}
        ${quizPick === undefined ? `<div style="margin-top:18px;"><button class="btn primary" onclick="submitQuiz('${id}')">Check answer</button></div>` : ""}
      </div>
      <div class="card">
        <div class="card-head"><span class="card-eyebrow">Journal prompt</span><span class="card-line"></span></div>
        <div class="q">${chapter.journal}</div>
        <textarea class="journal-input" id="journal-${id}" placeholder="Write freely. Saves automatically.">${journalText}</textarea>
        <div class="save-row" id="save-status-${id}">Saved automatically as you type.</div>
      </div>
      <div style="text-align:center; margin: 40px 0;">
        <button class="btn ${isDone ? "" : "primary"}" onclick="toggleDone('${id}')">${isDone ? "✓ Marked complete" : "Mark chapter complete"}</button>
      </div>
      <nav class="nav-row">
        <div>${prev ? `<a class="nav-link" onclick="loadChapter('${prev.id}')"><span class="nl-eyebrow">← Previous</span><span class="nl-title">${prev.id} · ${prev.title}</span></a>` : `<a class="nav-link" onclick="goHome()"><span class="nl-eyebrow">← Back</span><span class="nl-title">Course home</span></a>`}</div>
        <div>${next ? `<a class="nav-link right-align" onclick="loadChapter('${next.id}')"><span class="nl-eyebrow">Next →</span><span class="nl-title">${next.id} · ${next.title}</span></a>` : `<a class="nav-link right-align" onclick="goHome()"><span class="nl-eyebrow">Finish →</span><span class="nl-title">Return home</span></a>`}</div>
      </nav>
    </div>`;
  document.getElementById("main").innerHTML = html;

  const ta = document.getElementById("journal-" + id);
  if (ta) {
    let timer;
    ta.addEventListener("input", () => {
      state.journals[journalKey] = ta.value;
      const statusEl = document.getElementById("save-status-" + id);
      if (statusEl) statusEl.textContent = "Saving…";
      clearTimeout(timer);
      timer = setTimeout(() => {
        saveState(state);
        if (statusEl) {
          statusEl.textContent = "Saved.";
          setTimeout(() => { if (statusEl) statusEl.textContent = "Saved automatically as you type."; }, 1400);
        }
      }, 350);
    });
  }
}

function pickOpt(id, i) {
  if (state.quizPicks[id] !== undefined) return;
  state.tempPick = i;
  document.querySelectorAll(".opt").forEach((el) => {
    el.classList.toggle("selected", parseInt(el.dataset.i) === i);
  });
}
function submitQuiz(id) {
  if (state.tempPick === undefined) { alert("Pick an answer first."); return; }
  state.quizPicks[id] = state.tempPick;
  delete state.tempPick;
  saveState(state); renderChapter(id); renderHeaderProgress();
}
function toggleDone(id) {
  state.completed[id] = !state.completed[id];
  saveState(state); renderChapter(id); renderHeaderProgress();
}

// ===== INIT =====
renderHeaderProgress();
if (state.view === "chapter" && state.currentId && findChapter(state.currentId)) renderChapter(state.currentId);
else if (state.view === "week" && state.currentWeek) renderWeek(state.currentWeek);
else renderHome();
</script>
</body>
</html>
